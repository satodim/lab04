version: 1.0.{build}


image: Visual Studio 2022


configuration:
  - Release


install:
  - choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'


build_script:
  - mkdir _build
  - cd _build
  - cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_INSTALL_PREFIX=_install
  - cmake --build . --config %CONFIGURATION%
